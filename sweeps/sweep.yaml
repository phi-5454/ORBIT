# Example sweep config
program: src/main.py
method: bayes
metric:
  name: val_loss
  goal: minimize
parameters:
  model.lr: # dot notation to match Hydra's hierarchy
    distribution: log_uniform_values
    min: 0.0001
    max: 0.01
  model.hidden_dim:
    values: [64, 128, 256]

command:
  - ${env}
  - python
  - ${program}
  - ${args_no_hyphens} # Hydra compatiblity
